name: Feature request
description: Propose a new capability or a change to an existing one.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Proposals that cite a peer-reviewed paper, a published standard, or a concrete production use-case get triaged faster. VSBS is a research-grade project; every decision should be traceable.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, agent, or operator problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Outline the smallest coherent change that addresses the problem.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: citation
    attributes:
      label: Research or standard grounding
      description: Link the paper, standard, or vendor doc this change is based on.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - packages/shared
        - packages/sensors
        - packages/llm
        - packages/agents
        - apps/api
        - apps/web
        - infra/terraform
        - docs
        - other
    validations:
      required: true
