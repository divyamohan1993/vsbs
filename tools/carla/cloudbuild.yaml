# Build context = tools/carla/. Dockerfile at cloudrun/Dockerfile.
# Triggered via: gcloud builds submit tools/carla --config tools/carla/cloudbuild.yaml --project dmjone --region asia-east1
substitutions:
  _IMAGE: asia-east1-docker.pkg.dev/dmjone/cloud-run-source-deploy/vsbs-chaos-driver
  _TAG: latest

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - cloudrun/Dockerfile
      - -t
      - ${_IMAGE}:${_TAG}
      - -t
      - ${_IMAGE}:${SHORT_SHA}
      - .

images:
  - ${_IMAGE}:${_TAG}
  - ${_IMAGE}:${SHORT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
