<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Right camera placeholder — CARLA side view with cyclist and tower at dusk">
  <defs>
    <linearGradient id="skyRt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222746"/>
      <stop offset="0.55" stop-color="#604563"/>
      <stop offset="1" stop-color="#d97c4b"/>
    </linearGradient>
    <linearGradient id="bldgRt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1f26"/>
      <stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="roadRt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13161b"/>
      <stop offset="1" stop-color="#1d2128"/>
    </linearGradient>
    <radialGradient id="hazeRt" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="bikeLamp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffae4"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="180" fill="url(#skyRt)"/>
  <!-- Tower building on right -->
  <polygon points="640,0 400,0 400,360 640,360" fill="url(#bldgRt)"/>
  <!-- Window grid -->
  <g fill="#1f242d">
    <rect x="430" y="40"  width="26" height="20"/><rect x="464" y="40"  width="26" height="20"/><rect x="498" y="40"  width="26" height="20"/><rect x="532" y="40"  width="26" height="20"/><rect x="566" y="40"  width="26" height="20"/><rect x="600" y="40"  width="26" height="20"/>
    <rect x="430" y="72"  width="26" height="20"/><rect x="464" y="72"  width="26" height="20"/><rect x="498" y="72"  width="26" height="20"/><rect x="532" y="72"  width="26" height="20"/><rect x="566" y="72"  width="26" height="20"/><rect x="600" y="72"  width="26" height="20"/>
    <rect x="430" y="104" width="26" height="20"/><rect x="464" y="104" width="26" height="20"/><rect x="498" y="104" width="26" height="20"/><rect x="532" y="104" width="26" height="20"/><rect x="566" y="104" width="26" height="20"/><rect x="600" y="104" width="26" height="20"/>
    <rect x="430" y="136" width="26" height="20"/><rect x="464" y="136" width="26" height="20"/><rect x="498" y="136" width="26" height="20"/><rect x="532" y="136" width="26" height="20"/><rect x="566" y="136" width="26" height="20"/><rect x="600" y="136" width="26" height="20"/>
  </g>
  <g fill="#9ec9ff" opacity="0.7">
    <rect x="498" y="40"  width="26" height="20"/>
    <rect x="566" y="72"  width="26" height="20"/>
    <rect x="430" y="104" width="26" height="20"/>
    <rect x="600" y="136" width="26" height="20"/>
  </g>
  <g fill="#ffd58a" opacity="0.7">
    <rect x="464" y="40"  width="26" height="20"/>
    <rect x="532" y="104" width="26" height="20"/>
    <rect x="498" y="136" width="26" height="20"/>
  </g>
  <!-- Ground-floor storefront -->
  <rect x="400" y="180" width="240" height="40" fill="#0a0e16"/>
  <rect x="412" y="186" width="216" height="28" fill="#161a22"/>
  <g fill="#c9a36a" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9">
    <text x="520" y="204" text-anchor="middle">FREMDLING · PHARMACY · BLDG 12</text>
  </g>
  <rect x="430" y="225" width="100" height="80" fill="#1d242c"/>
  <rect x="432" y="227" width="96"  height="76" fill="#324048" opacity="0.85"/>
  <rect x="540" y="225" width="80"  height="80" fill="#202830"/>
  <rect x="542" y="227" width="76"  height="76" fill="#3a474e"/>
  <!-- Sidewalk -->
  <polygon points="400,360 640,360 640,308 390,308" fill="#23262d"/>
  <line x1="640" y1="308" x2="390" y2="308" stroke="#2c3038" stroke-width="2"/>
  <!-- Curb -->
  <line x1="390" y1="308" x2="0"  y2="280" stroke="#2c3038" stroke-width="2"/>
  <!-- Road -->
  <polygon points="390,308 0,280 0,360 390,360" fill="url(#roadRt)"/>
  <!-- Lane stripes -->
  <g stroke="#e7e3d1" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8">
    <line x1="380" y1="332" x2="358" y2="330"/>
    <line x1="335" y1="328" x2="312" y2="326"/>
    <line x1="288" y1="324" x2="265" y2="322"/>
    <line x1="238" y1="319" x2="215" y2="317"/>
    <line x1="188" y1="314" x2="164" y2="312"/>
    <line x1="134" y1="308" x2="110" y2="306"/>
    <line x1="80"  y1="302" x2="56"  y2="300"/>
  </g>
  <!-- Cyclist on bike lane -->
  <g transform="translate(220 312) scale(1)">
    <!-- Bike frame -->
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#1d242c" stroke-width="2"/>
    <line x1="-12" y1="0" x2="-4" y2="-14" stroke="#1d242c" stroke-width="2"/>
    <line x1="12"  y1="0" x2="4"  y2="-14" stroke="#1d242c" stroke-width="2"/>
    <circle cx="-12" cy="0" r="6" fill="none" stroke="#0a0c10" stroke-width="2"/>
    <circle cx="12"  cy="0" r="6" fill="none" stroke="#0a0c10" stroke-width="2"/>
    <!-- Rider silhouette -->
    <circle cx="0" cy="-20" r="3.5" fill="#0a0c14"/>
    <rect x="-3" y="-17" width="6" height="10" fill="#0a0c14"/>
    <rect x="-2" y="-7"  width="4" height="6"  fill="#0a0c14"/>
    <!-- Front lamp -->
    <circle cx="-14" cy="-1" r="2.5" fill="#fffae4"/>
    <ellipse cx="-20" cy="-1" rx="12" ry="4" fill="url(#bikeLamp)"/>
  </g>
  <!-- Parked car further back -->
  <g transform="translate(80 298) scale(0.65)" opacity="0.85">
    <rect x="-40" y="-16" width="80" height="20" rx="4" fill="#0e1015"/>
    <rect x="-32" y="-26" width="60" height="12" rx="3" fill="#161922"/>
    <circle cx="-25" cy="5"  r="5" fill="#0a0c10"/>
    <circle cx="25"  cy="5"  r="5" fill="#0a0c10"/>
  </g>
  <!-- Pedestrian crossing the sidewalk -->
  <g transform="translate(500 285) scale(0.9)" fill="#0a0c14">
    <circle cx="0" cy="-12" r="3.5"/>
    <rect x="-3" y="-9" width="6" height="14"/>
    <rect x="-3" y="5" width="3" height="8"/>
    <rect x="0"  y="5" width="3" height="8"/>
  </g>
  <!-- Streetlamp -->
  <line x1="392" y1="150" x2="392" y2="308" stroke="#2a2f3a" stroke-width="2"/>
  <line x1="392" y1="150" x2="370" y2="150" stroke="#2a2f3a" stroke-width="2"/>
  <circle cx="368" cy="150" r="3" fill="#ffd996"/>
  <circle cx="368" cy="150" r="9" fill="#ffd996" opacity="0.18"/>
  <rect width="640" height="360" fill="url(#hazeRt)"/>
  <!-- HUD corners -->
  <g stroke="#c9a36a" stroke-width="1.6" fill="none" opacity="0.85">
    <polyline points="14,14 14,30 30,30"/>
    <polyline points="626,14 626,30 610,30"/>
    <polyline points="14,346 14,330 30,330"/>
    <polyline points="626,346 626,330 610,330"/>
  </g>
  <g stroke="#c9a36a" stroke-width="1" fill="#c9a36a" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" opacity="0.75">
    <text x="320" y="22" text-anchor="middle">— RIGHT · WIDE 110° —</text>
  </g>
</svg>
