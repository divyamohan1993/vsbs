<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Rear camera placeholder — CARLA Town10HD scene looking back at dusk">
  <defs>
    <linearGradient id="skyR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1424"/>
      <stop offset="0.5" stop-color="#2a2c52"/>
      <stop offset="0.85" stop-color="#5c2e4a"/>
      <stop offset="1" stop-color="#8a4540"/>
    </linearGradient>
    <linearGradient id="roadR" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#1c1e22"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <radialGradient id="hazeR" cx="0.5" cy="0.6" r="0.55">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="headlamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffae4"/>
      <stop offset="0.5" stop-color="#fff2c8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="220" fill="url(#skyR)"/>
  <!-- Skyline behind, denser -->
  <g fill="#070a12" opacity="0.95">
    <rect x="0"   y="148" width="62"  height="72"/>
    <rect x="58"  y="118" width="54"  height="102"/>
    <rect x="108" y="100" width="46"  height="120"/>
    <rect x="150" y="130" width="60"  height="90"/>
    <rect x="206" y="86"  width="68"  height="134"/>
    <rect x="270" y="110" width="48"  height="110"/>
    <rect x="314" y="92"  width="54"  height="128"/>
    <rect x="364" y="124" width="46"  height="96"/>
    <rect x="406" y="98"  width="58"  height="122"/>
    <rect x="460" y="130" width="52"  height="90"/>
    <rect x="508" y="110" width="60"  height="110"/>
    <rect x="564" y="136" width="76"  height="84"/>
  </g>
  <g fill="#9ec9ff" opacity="0.4">
    <rect x="74"  y="130" width="2" height="3"/>
    <rect x="120" y="116" width="2" height="3"/>
    <rect x="220" y="100" width="2" height="3"/>
    <rect x="284" y="124" width="2" height="3"/>
    <rect x="326" y="110" width="2" height="3"/>
    <rect x="420" y="114" width="2" height="3"/>
    <rect x="520" y="122" width="2" height="3"/>
    <rect x="586" y="148" width="2" height="3"/>
  </g>
  <g fill="#ffd28a" opacity="0.55">
    <rect x="84"  y="142" width="2" height="3"/>
    <rect x="218" y="112" width="2" height="3"/>
    <rect x="334" y="98"  width="2" height="3"/>
    <rect x="432" y="126" width="2" height="3"/>
    <rect x="518" y="148" width="2" height="3"/>
  </g>
  <!-- Road (mirrored: vanishing point closer = farther away because we're looking backward) -->
  <polygon points="0,360 640,360 440,260 200,260" fill="url(#roadR)"/>
  <line x1="200" y1="260" x2="0"   y2="360" stroke="#3a3f48" stroke-width="2"/>
  <line x1="440" y1="260" x2="640" y2="360" stroke="#3a3f48" stroke-width="2"/>
  <!-- Lane dashes -->
  <g stroke="#e7e3d1" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="294" y1="278" x2="289" y2="290"/>
    <line x1="282" y1="302" x2="273" y2="318"/>
    <line x1="262" y1="332" x2="248" y2="358"/>
    <line x1="346" y1="278" x2="351" y2="290"/>
    <line x1="358" y1="302" x2="367" y2="318"/>
    <line x1="378" y1="332" x2="392" y2="358"/>
  </g>
  <line x1="319" y1="262" x2="319" y2="358" stroke="#f3c14a" stroke-width="1.5" stroke-opacity="0.85"/>
  <line x1="322" y1="262" x2="322" y2="358" stroke="#f3c14a" stroke-width="1.5" stroke-opacity="0.85"/>
  <!-- Sidewalk -->
  <polygon points="0,360 200,260 198,260 0,353" fill="#22252b" opacity="0.75"/>
  <polygon points="640,360 440,260 442,260 640,353" fill="#22252b" opacity="0.75"/>
  <!-- Following car with headlights -->
  <g transform="translate(320 285) scale(0.95)">
    <rect x="-32" y="-14" width="64" height="18" rx="3" fill="#0e1015"/>
    <rect x="-26" y="-22" width="52" height="10" rx="2" fill="#16181f"/>
    <!-- Headlamps -->
    <circle cx="-22" cy="-4" r="3" fill="#fffae4"/>
    <circle cx="22"  cy="-4" r="3" fill="#fffae4"/>
    <ellipse cx="-22" cy="-4" rx="14" ry="6" fill="url(#headlamp)"/>
    <ellipse cx="22"  cy="-4" rx="14" ry="6" fill="url(#headlamp)"/>
  </g>
  <!-- Far car with smaller headlights -->
  <g transform="translate(280 268) scale(0.45)" opacity="0.8">
    <rect x="-22" y="-10" width="44" height="12" rx="2" fill="#0e1015"/>
    <circle cx="-15" cy="-3" r="2" fill="#fffae4"/>
    <circle cx="15"  cy="-3" r="2" fill="#fffae4"/>
  </g>
  <!-- Lights on left lane -->
  <g transform="translate(380 274) scale(0.5)" opacity="0.85">
    <rect x="-22" y="-10" width="44" height="12" rx="2" fill="#0e1015"/>
    <circle cx="-15" cy="-3" r="2" fill="#fffae4"/>
    <circle cx="15"  cy="-3" r="2" fill="#fffae4"/>
  </g>
  <!-- Wet reflection -->
  <polygon points="200,260 440,260 410,290 230,290" fill="#fff" opacity="0.04"/>
  <rect width="640" height="360" fill="url(#hazeR)"/>
  <!-- HUD corners -->
  <g stroke="#c9a36a" stroke-width="1.6" fill="none" opacity="0.85">
    <polyline points="14,14 14,30 30,30"/>
    <polyline points="626,14 626,30 610,30"/>
    <polyline points="14,346 14,330 30,330"/>
    <polyline points="626,346 626,330 610,330"/>
  </g>
  <!-- "MIRRORED" indicator -->
  <g stroke="#c9a36a" stroke-width="1" fill="#c9a36a" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" opacity="0.75">
    <text x="320" y="22" text-anchor="middle">— REAR · MIRRORED —</text>
  </g>
  <!-- Distance ladder (left side) -->
  <g stroke="#c9a36a" stroke-width="1" fill="#c9a36a" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="8" opacity="0.6">
    <line x1="40" y1="270" x2="28" y2="270"/><text x="44" y="273">5 m</text>
    <line x1="40" y1="300" x2="28" y2="300"/><text x="44" y="303">15 m</text>
    <line x1="40" y1="330" x2="28" y2="330"/><text x="44" y="333">40 m</text>
  </g>
</svg>
