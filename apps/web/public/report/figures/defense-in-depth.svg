<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    .legend { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 11px; fill: #0F4761; font-weight: 600; }
    .legend-sub { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 10.5px; fill: #595959; }
    .note { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 11px; fill: #0F4761; font-weight: 600; }
  </style>
  <circle cx="220" cy="180" r="170" fill="#0F4761" opacity="0.92"/>
  <circle cx="220" cy="180" r="145" fill="#1e40af" opacity="0.88"/>
  <circle cx="220" cy="180" r="120" fill="#2563eb" opacity="0.84"/>
  <circle cx="220" cy="180" r="95" fill="#0e7c66" opacity="0.80"/>
  <circle cx="220" cy="180" r="70" fill="#c9a36a" opacity="0.76"/>
  <circle cx="220" cy="180" r="42" fill="#b23a48" opacity="0.72"/>

  <rect x="430" y="28" width="20" height="20" rx="4" fill="#0F4761"/>
  <text x="460" y="42" class="legend">Cloud Armor</text>
  <text x="460" y="56" class="legend-sub">OWASP CRS · scanner detect · rate ban</text>

  <rect x="430" y="68" width="20" height="20" rx="4" fill="#1e40af"/>
  <text x="460" y="82" class="legend">Identity-Aware Proxy</text>
  <text x="460" y="96" class="legend-sub">ES256 signed assertion · admin path</text>

  <rect x="430" y="108" width="20" height="20" rx="4" fill="#2563eb"/>
  <text x="460" y="122" class="legend">Path-aware Rate Limit</text>
  <text x="460" y="136" class="legend-sub">high-volume ingest · metrics · global</text>

  <rect x="430" y="148" width="20" height="20" rx="4" fill="#0e7c66"/>
  <text x="460" y="162" class="legend">requireSession (HMAC bearer)</text>
  <text x="460" y="176" class="legend-sub">owner subject in c.var; uniform 401</text>

  <rect x="430" y="188" width="20" height="20" rx="4" fill="#c9a36a"/>
  <text x="460" y="202" class="legend">requireConsent (purpose)</text>
  <text x="460" y="216" class="legend-sub">explicit · revocable · versioned</text>

  <rect x="430" y="228" width="20" height="20" rx="4" fill="#b23a48"/>
  <text x="460" y="242" class="legend">Zod schema + handler</text>
  <text x="460" y="256" class="legend-sub">ownership check; idempotency keys</text>

  <text x="220" y="338" class="note" text-anchor="middle">A request must clear every layer; each fails closed independently.</text>
</svg>