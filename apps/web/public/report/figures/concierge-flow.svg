<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F4761"/>
    </marker>
    <linearGradient id="actor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f4761"/>
    </linearGradient>
  </defs>
  <style>
    .actor-lbl { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 13px; fill: white; font-weight: 600; }
    .msg { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 11px; fill: #0F4761; }
    .ok { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 11px; fill: #0e7c66; font-weight: 600; }
    .crimson { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 11px; fill: #b23a48; font-weight: 600; }
    .lane { stroke: #B0B6BD; stroke-width: 1; stroke-dasharray: 4 4; }
    .arrow { stroke: #0F4761; stroke-width: 1.4; fill: none; }
  </style>

  <rect x="20" y="20" width="100" height="34" rx="8" fill="url(#actor)"/>
  <text x="70" y="42" class="actor-lbl" text-anchor="middle">Owner</text>
  <line x1="70" y1="54" x2="70" y2="292" class="lane"/>

  <rect x="180" y="20" width="100" height="34" rx="8" fill="url(#actor)"/>
  <text x="230" y="42" class="actor-lbl" text-anchor="middle">Web Proxy</text>
  <line x1="230" y1="54" x2="230" y2="292" class="lane"/>

  <rect x="340" y="20" width="100" height="34" rx="8" fill="url(#actor)"/>
  <text x="390" y="42" class="actor-lbl" text-anchor="middle">API</text>
  <line x1="390" y1="54" x2="390" y2="292" class="lane"/>

  <rect x="500" y="20" width="100" height="34" rx="8" fill="url(#actor)"/>
  <text x="550" y="42" class="actor-lbl" text-anchor="middle">Verifier</text>
  <line x1="550" y1="54" x2="550" y2="292" class="lane"/>

  <rect x="640" y="20" width="100" height="34" rx="8" fill="url(#actor)"/>
  <text x="690" y="42" class="actor-lbl" text-anchor="middle">Tool</text>
  <line x1="690" y1="54" x2="690" y2="292" class="lane"/>

  <line x1="74" y1="76" x2="226" y2="76" class="arrow" marker-end="url(#ah2)"/>
  <text x="150" y="71" class="msg" text-anchor="middle">POST /turn (bearer)</text>

  <line x1="234" y1="100" x2="386" y2="100" class="arrow" marker-end="url(#ah2)"/>
  <text x="310" y="95" class="msg" text-anchor="middle">strip cookie/auth, forward bearer</text>

  <line x1="394" y1="124" x2="546" y2="124" class="arrow" marker-end="url(#ah2)"/>
  <text x="470" y="119" class="msg" text-anchor="middle">tool-call (assessSafety)</text>

  <line x1="546" y1="148" x2="394" y2="148" class="arrow" marker-end="url(#ah2)"/>
  <text x="470" y="143" class="ok" text-anchor="middle">grounded = true</text>

  <line x1="394" y1="172" x2="686" y2="172" class="arrow" marker-end="url(#ah2)"/>
  <text x="540" y="167" class="msg" text-anchor="middle">execute tool</text>

  <line x1="686" y1="196" x2="394" y2="196" class="arrow" marker-end="url(#ah2)"/>
  <text x="540" y="191" class="ok" text-anchor="middle">tool-result</text>

  <line x1="386" y1="220" x2="74" y2="220" class="arrow" marker-end="url(#ah2)"/>
  <text x="230" y="215" class="msg" text-anchor="middle">SSE: delta (model suggestion)</text>

  <line x1="386" y1="244" x2="74" y2="244" class="arrow" marker-end="url(#ah2)"/>
  <text x="230" y="239" class="crimson" text-anchor="middle">SSE: final (canonical safety advisory)</text>

  <line x1="386" y1="268" x2="74" y2="268" class="arrow" marker-end="url(#ah2)"/>
  <text x="230" y="263" class="ok" text-anchor="middle">SSE: end</text>
</svg>