<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="ts-client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#0f4761"/>
    </linearGradient>
    <linearGradient id="ts-app" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7c66"/><stop offset="100%" stop-color="#0a5443"/>
    </linearGradient>
    <linearGradient id="ts-data" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F4761"/><stop offset="100%" stop-color="#082c3e"/>
    </linearGradient>
    <linearGradient id="ts-ext" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a36a"/><stop offset="100%" stop-color="#a07e48"/>
    </linearGradient>
    <linearGradient id="ts-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b23a48"/><stop offset="100%" stop-color="#7e2530"/>
    </linearGradient>
  </defs>
  <style>
    .h { font-family: "Times New Roman", serif; font-size: 13px; fill: white; font-weight: 700; }
    .v { font-family: "Times New Roman", serif; font-size: 11px; fill: white; }
    .vm { font-family: "Times New Roman", serif; font-size: 11px; fill: rgba(255,255,255,0.92); font-style: italic; }
    .lab { font-family: "Times New Roman", serif; font-size: 11px; fill: #595959; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .cap { font-family: "Times New Roman", serif; font-size: 11px; fill: #0F4761; font-style: italic; }
  </style>
  <text x="440" y="22" class="cap" text-anchor="middle" font-weight="700" font-style="normal" font-size="12.5">Stack layers · pinned versions from package-lock as of 2026-05-11</text>

  <!-- Layer 1: Edge -->
  <text x="40" y="60" class="lab">Edge</text>
  <rect x="40" y="68" width="800" height="44" rx="10" fill="url(#ts-edge)"/>
  <text x="64" y="94" class="h">Cloud Armor</text>
  <text x="64" y="106" class="v">OWASP CRS · scanner detect · rate ban</text>
  <text x="290" y="94" class="h">Identity-Aware Proxy</text>
  <text x="290" y="106" class="v">ES256 admin assertions</text>
  <text x="500" y="94" class="h">Strict CSP</text>
  <text x="500" y="106" class="v">per-request nonce · script-src strict-dynamic</text>
  <text x="740" y="94" class="h">TLS 1.3</text>
  <text x="740" y="106" class="v">HSTS preload</text>

  <!-- Layer 2: Client -->
  <text x="40" y="138" class="lab">Client</text>
  <rect x="40" y="146" width="260" height="68" rx="10" fill="url(#ts-client)"/>
  <text x="64" y="170" class="h">Customer web</text>
  <text x="64" y="186" class="v">Next.js 16.2.3 · React 19.0</text>
  <text x="64" y="202" class="v">Tailwind 4.2 · next-intl 4</text>

  <rect x="312" y="146" width="260" height="68" rx="10" fill="url(#ts-client)"/>
  <text x="336" y="170" class="h">Operator admin</text>
  <text x="336" y="186" class="v">Next.js 16.2 + edge IAP verifier</text>
  <text x="336" y="202" class="v">SIEM-style log pane</text>

  <rect x="584" y="146" width="256" height="68" rx="10" fill="url(#ts-client)"/>
  <text x="608" y="170" class="h">Owner mobile</text>
  <text x="608" y="186" class="v">Expo · React Native</text>
  <text x="608" y="202" class="v">Passkeys · OBD-II BLE</text>

  <!-- Layer 3: Application -->
  <text x="40" y="240" class="lab">Application</text>
  <rect x="40" y="248" width="800" height="84" rx="10" fill="url(#ts-app)"/>
  <text x="60" y="272" class="h">apps/api · Hono 4.12 on Bun 1.3</text>
  <text x="60" y="290" class="v">requireSession · adminOnly · requireConsent · rate-limit · OpenTelemetry · Zod 3.25</text>
  <line x1="60" y1="298" x2="820" y2="298" stroke="rgba(255,255,255,0.2)"/>
  <text x="60" y="318" class="vm">@vsbs/agents</text>
  <text x="160" y="318" class="vm">@vsbs/shared</text>
  <text x="260" y="318" class="vm">@vsbs/sensors</text>
  <text x="360" y="318" class="vm">@vsbs/llm</text>
  <text x="430" y="318" class="vm">@vsbs/security</text>
  <text x="530" y="318" class="vm">@vsbs/compliance</text>
  <text x="640" y="318" class="vm">@vsbs/telemetry</text>
  <text x="750" y="318" class="vm">@vsbs/kb</text>

  <!-- Layer 4: Data + external -->
  <text x="40" y="358" class="lab">Data + external services</text>
  <rect x="40" y="366" width="380" height="74" rx="10" fill="url(#ts-data)"/>
  <text x="60" y="390" class="h">Google Cloud Platform</text>
  <text x="60" y="406" class="v">Cloud Run · Firestore (asia-south1)</text>
  <text x="60" y="422" class="v">Secret Manager · Artifact Registry</text>

  <rect x="432" y="366" width="408" height="74" rx="10" fill="url(#ts-ext)"/>
  <text x="452" y="390" class="h">External adapters · sim/live parity</text>
  <text x="452" y="406" class="v">Smartcar · ELM327 OBD-II · Mercedes IPP · CARLA 0.9.16</text>
  <text x="452" y="422" class="v">Razorpay · Twilio · Msg91 · Anthropic · Vertex Gemini</text>
</svg>
