<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="100%" preserveAspectRatio="xMidYMid meet">
  <style>
    .lbl { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 12.5px; fill: white; font-weight: 700; }
    .count { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 12px; fill: white; font-weight: 600; }
  </style>
  <rect x="80" y="30" width="600" height="22" rx="6" fill="#0F4761"/>
  <text x="92" y="45" class="lbl">1 · Typecheck</text>
  <text x="674" y="45" class="count" text-anchor="end">12 workspaces</text>

  <rect x="80" y="60" width="570" height="22" rx="6" fill="#1d4ed8"/>
  <text x="92" y="75" class="lbl">2 · Unit tests</text>
  <text x="644" y="75" class="count" text-anchor="end">1,136 tests</text>

  <rect x="80" y="90" width="540" height="22" rx="6" fill="#2563eb"/>
  <text x="92" y="105" class="lbl">3 · Property + agent eval + chaos</text>
  <text x="614" y="105" class="count" text-anchor="end">166 tests</text>

  <rect x="80" y="120" width="510" height="22" rx="6" fill="#0e7c66"/>
  <text x="92" y="135" class="lbl">4 · Live HTTP smoke</text>
  <text x="584" y="135" class="count" text-anchor="end">19 probes</text>

  <rect x="80" y="150" width="480" height="22" rx="6" fill="#0e7c66"/>
  <text x="92" y="165" class="lbl">5 · Concierge SSE safety chain</text>
  <text x="554" y="165" class="count" text-anchor="end">1 fence</text>

  <rect x="80" y="180" width="450" height="22" rx="6" fill="#c9a36a"/>
  <text x="92" y="195" class="lbl">6 · CARLA / chaos driver</text>
  <text x="524" y="195" class="count" text-anchor="end">22 calls</text>

  <rect x="80" y="210" width="420" height="22" rx="6" fill="#c9a36a"/>
  <text x="92" y="225" class="lbl">7 · Playwright e2e</text>
  <text x="494" y="225" class="count" text-anchor="end">21 cases</text>

  <rect x="80" y="240" width="390" height="22" rx="6" fill="#a07e48"/>
  <text x="92" y="255" class="lbl">8 · Witness report</text>
  <text x="464" y="255" class="count" text-anchor="end">1 file</text>

  <rect x="80" y="270" width="360" height="22" rx="6" fill="#a07e48"/>
  <text x="92" y="285" class="lbl">9 · Cleanup</text>
  <text x="434" y="285" class="count" text-anchor="end">0 leaks</text>

  <text x="80" y="316" class="lbl" fill="#0F4761">Each layer catches a class of failure the previous cannot.</text>
</svg>