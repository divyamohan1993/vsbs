<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="gApp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f4761"/>
    </linearGradient>
    <linearGradient id="gPkg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gInfra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7c66"/>
      <stop offset="100%" stop-color="#0a5443"/>
    </linearGradient>
    <linearGradient id="gAdapter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a36a"/>
      <stop offset="100%" stop-color="#a07e48"/>
    </linearGradient>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F4761"/>
    </marker>
  </defs>
  <style>
    .lbl { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 13px; fill: white; font-weight: 600; }
    .sub { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 10.5px; fill: rgba(255,255,255,0.92); }
    .edge { stroke: #0F4761; stroke-width: 1.4; fill: none; }
    .layerlabel { font-family: Calibri, Aptos, system-ui, sans-serif; font-size: 11px; fill: #595959; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  </style>

  <text x="20" y="36" class="layerlabel">Client tier</text>
  <g>
    <rect x="20" y="44" width="220" height="56" rx="10" fill="url(#gApp)"/>
    <text x="130" y="68" class="lbl" text-anchor="middle">Customer Web</text>
    <text x="130" y="86" class="sub" text-anchor="middle">Next.js 16 · React 19 · Tailwind 4</text>
  </g>
  <g>
    <rect x="270" y="44" width="220" height="56" rx="10" fill="url(#gApp)"/>
    <text x="380" y="68" class="lbl" text-anchor="middle">Operator Admin</text>
    <text x="380" y="86" class="sub" text-anchor="middle">Next.js 16 · IAP-gated</text>
  </g>
  <g>
    <rect x="520" y="44" width="220" height="56" rx="10" fill="url(#gApp)"/>
    <text x="630" y="68" class="lbl" text-anchor="middle">Owner Mobile</text>
    <text x="630" y="86" class="sub" text-anchor="middle">Expo · React Native · OBD-II BLE</text>
  </g>

  <text x="20" y="136" class="layerlabel">Edge</text>
  <g>
    <rect x="20" y="146" width="720" height="44" rx="10" fill="#0F4761"/>
    <text x="380" y="172" class="lbl" text-anchor="middle">Cloud Armor + Identity-Aware Proxy + Strict CSP · Asia-South1 · TLS 1.3</text>
  </g>

  <line x1="130" y1="100" x2="130" y2="146" class="edge" marker-end="url(#arrowHead)"/>
  <line x1="380" y1="100" x2="380" y2="146" class="edge" marker-end="url(#arrowHead)"/>
  <line x1="630" y1="100" x2="630" y2="146" class="edge" marker-end="url(#arrowHead)"/>

  <text x="20" y="220" class="layerlabel">API tier</text>
  <g>
    <rect x="20" y="230" width="720" height="60" rx="10" fill="url(#gInfra)"/>
    <text x="380" y="254" class="lbl" text-anchor="middle">apps/api · Hono on Bun · request-id · pii-redacting log · rate-limit · secure-headers</text>
    <text x="380" y="274" class="sub" text-anchor="middle">requireSession · adminOnly · requireConsent · Zod-validated routes · OpenTelemetry traces</text>
  </g>
  <line x1="380" y1="190" x2="380" y2="230" class="edge" marker-end="url(#arrowHead)"/>

  <text x="20" y="316" class="layerlabel">Package layer</text>
  <g transform="translate(20,326)">
    <rect x="0" y="0" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="85" y="20" class="lbl" text-anchor="middle">@vsbs/shared</text>
    <rect x="180" y="0" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="265" y="20" class="lbl" text-anchor="middle">@vsbs/sensors</text>
    <rect x="360" y="0" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="445" y="20" class="lbl" text-anchor="middle">@vsbs/llm</text>
    <rect x="540" y="0" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="625" y="20" class="lbl" text-anchor="middle">@vsbs/agents</text>
    <rect x="0" y="38" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="85" y="58" class="lbl" text-anchor="middle">@vsbs/security</text>
    <rect x="180" y="38" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="265" y="58" class="lbl" text-anchor="middle">@vsbs/compliance</text>
    <rect x="360" y="38" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="445" y="58" class="lbl" text-anchor="middle">@vsbs/telemetry</text>
    <rect x="540" y="38" width="170" height="30" rx="6" fill="url(#gPkg)"/><text x="625" y="58" class="lbl" text-anchor="middle">@vsbs/kb</text>
  </g>

  <text x="20" y="420" class="layerlabel">External adapters</text>
  <g transform="translate(20,430)">
    <rect x="0" y="0" width="170" height="28" rx="6" fill="url(#gAdapter)"/><text x="85" y="18" class="lbl" text-anchor="middle">Smartcar OEM</text>
    <rect x="180" y="0" width="170" height="28" rx="6" fill="url(#gAdapter)"/><text x="265" y="18" class="lbl" text-anchor="middle">ELM327 OBD-II</text>
    <rect x="360" y="0" width="170" height="28" rx="6" fill="url(#gAdapter)"/><text x="445" y="18" class="lbl" text-anchor="middle">Mercedes IPP</text>
    <rect x="540" y="0" width="170" height="28" rx="6" fill="url(#gAdapter)"/><text x="625" y="18" class="lbl" text-anchor="middle">Razorpay / Stripe</text>
  </g>
</svg>