<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="rm-done" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7c66"/><stop offset="100%" stop-color="#0a5443"/>
    </linearGradient>
    <linearGradient id="rm-now" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a36a"/><stop offset="100%" stop-color="#a07e48"/>
    </linearGradient>
    <linearGradient id="rm-next" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <style>
    .lbl { font-family: "Times New Roman", serif; font-size: 11.5px; fill: white; font-weight: 700; }
    .sub { font-family: "Times New Roman", serif; font-size: 10px; fill: rgba(255,255,255,0.92); }
    .phase-id { font-family: "Times New Roman", serif; font-size: 11px; fill: #c9a36a; font-weight: 700; }
    .swim-h { font-family: "Times New Roman", serif; font-size: 11px; fill: #595959; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .axis { stroke: #b0b6bd; stroke-width: 1; }
    .h { font-family: "Times New Roman", serif; font-size: 12.5px; fill: #0F4761; font-weight: 700; }
    .leg { font-family: "Times New Roman", serif; font-size: 11px; fill: #111; }
    .note { font-family: "Times New Roman", serif; font-size: 10.5px; fill: #595959; font-style: italic; }
  </style>
  <text x="460" y="22" class="h" text-anchor="middle">Phased roadmap, docs/roadmap-prod-deploy.md · Phases 1 through 12</text>

  <!-- Legend -->
  <rect x="660" y="38" width="14" height="14" fill="url(#rm-done)"/>
  <text x="680" y="50" class="leg">shipped</text>
  <rect x="740" y="38" width="14" height="14" fill="url(#rm-now)"/>
  <text x="760" y="50" class="leg">in progress</text>
  <rect x="830" y="38" width="14" height="14" fill="url(#rm-next)"/>
  <text x="850" y="50" class="leg">queued</text>

  <!-- timeline base -->
  <line x1="80" y1="380" x2="860" y2="380" class="axis"/>
  <text x="80" y="400" class="note" text-anchor="middle">2025-Q4</text>
  <text x="280" y="400" class="note" text-anchor="middle">2026-Q1</text>
  <text x="480" y="400" class="note" text-anchor="middle">2026-Q2</text>
  <text x="680" y="400" class="note" text-anchor="middle">2026-Q3</text>
  <text x="860" y="400" class="note" text-anchor="middle">2026-Q4</text>

  <!-- Phase bars: x=80 start, each bar width ≈ 60-80px -->
  <!-- P1 done -->
  <rect x="60" y="70" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="68" y="82" class="phase-id">P1</text>
  <text x="68" y="96" class="lbl">Core booking loop</text>

  <!-- P2 done -->
  <rect x="120" y="110" width="140" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="128" y="122" class="phase-id">P2</text>
  <text x="128" y="136" class="lbl">Sensors + PHM + autonomy</text>

  <!-- P3 done -->
  <rect x="220" y="150" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="228" y="162" class="phase-id">P3</text>
  <text x="228" y="176" class="lbl">KB + retrieval</text>

  <!-- P4 done -->
  <rect x="280" y="190" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="288" y="202" class="phase-id">P4</text>
  <text x="288" y="216" class="lbl">Dual-region (IN + US)</text>

  <!-- P5 done -->
  <rect x="340" y="70" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="348" y="82" class="phase-id">P5</text>
  <text x="348" y="96" class="lbl">Consent + compliance</text>

  <!-- P6 done -->
  <rect x="400" y="110" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="408" y="122" class="phase-id">P6</text>
  <text x="408" y="136" class="lbl">Security hardening</text>

  <!-- P7 done -->
  <rect x="460" y="150" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="468" y="162" class="phase-id">P7</text>
  <text x="468" y="176" class="lbl">Observability + ops</text>

  <!-- P8 done -->
  <rect x="520" y="190" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="528" y="202" class="phase-id">P8</text>
  <text x="528" y="216" class="lbl">Realtime + UX polish</text>

  <!-- P9 done -->
  <rect x="580" y="230" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="588" y="242" class="phase-id">P9</text>
  <text x="588" y="256" class="lbl">Mobile</text>

  <!-- P10 done -->
  <rect x="620" y="70" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="628" y="82" class="phase-id">P10</text>
  <text x="628" y="96" class="lbl">Admin console</text>

  <!-- P11 done -->
  <rect x="660" y="110" width="120" height="32" rx="6" fill="url(#rm-done)"/>
  <text x="668" y="122" class="phase-id">P11</text>
  <text x="668" y="136" class="lbl">Quality + verification</text>

  <!-- P12 in progress -->
  <rect x="720" y="150" width="140" height="32" rx="6" fill="url(#rm-now)"/>
  <text x="728" y="162" class="phase-id">P12</text>
  <text x="728" y="176" class="lbl">Pilot + go-live gates</text>

  <!-- Future / queued -->
  <rect x="700" y="270" width="160" height="32" rx="6" fill="url(#rm-next)"/>
  <text x="708" y="282" class="phase-id">Future</text>
  <text x="708" y="296" class="lbl">AlloyDB KG · GraphRAG</text>

  <rect x="700" y="310" width="160" height="32" rx="6" fill="url(#rm-next)"/>
  <text x="708" y="322" class="phase-id">Future</text>
  <text x="708" y="336" class="lbl">OEM tier expansion</text>

  <text x="460" y="372" class="note" text-anchor="middle">P1 through P11 shipped; P12 pilot is gated on safety, regulatory, insurance, and homologation reviews.</text>
</svg>
